name: Build pull request

on:
  pull_request:
    branches: [ "master", "3.*" , "4.*", "5.x" ]
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        description: ""
      rebuild_triggered:
        type: string
        description: ""
      triggered_by:
        type: string
        description: ""
      trigger_sha:
        type: string
        description: ""

jobs:
  build:
    permissions:
      checks: write
      contents: read
    uses: 'connectorio/gh-actions-shared/.github/workflows/maven.yml@master'
    secrets:
      CI_DEPLOY_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
      CI_DEPLOY_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
    with:
      openhab: true
      server_id: co7io-public-snapshots
      deploy: true
      skip_test_publish: false
      additional_profiles: 'thing4,openhab'
      master_branch: '3'